<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datatypes in JS</title>
</head>
<body>
    <script>
        //primitive
        let a = 9;
        console.log(typeof(a));
        let b;
        console.log(typeof (b));
        let c = null;
        console.log(typeof(c));

        //complex

        function add(){
            console.log(10 + 20);
        }
        add();

        let arr = [1,2,3];
        console.log(arr);

        let person = {
            name: "Suganth",
            age: 21
        }
        console.log(person.name, person.age);
    </script>
</body>
</html>
